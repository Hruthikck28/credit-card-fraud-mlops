name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-api:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pytest httpx mlflow scikit-learn python-dotenv feast pyarrow
        
    - name: Run API Tests
      env:
        # This securely injects your GitHub Repository Secret into the cloud runner
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}  
      run: |
        python -m pytest tests/test_api.py